- name: loop
  hosts: web
  become: yes
  tasks:
  - name: install packages
    ansible.builtin.package:
      name: "{{item.name}}"
      state: "{{item.state}}"
    loop:
    - {name: "gcc" , state: "present"}
    - {name: "git" , state: "present"}
    - {name: "mysql" , state: "present"}
    - {name: "zip" , state: "present"}