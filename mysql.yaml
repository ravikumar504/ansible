- name: expense 
  hosts: mysql
  become: yes

  tasks:
  - name: install dep
    ansible.builtin.pip:
      name: "{{item}}"
      executable: pip3.9
    loop:
      - pymysql
      - cryptography

  - name: install mysql
    ansible.builtin.package:
      name: mysql-server
      state: installed
  
  - name: start mysql
    ansible.builtin.service:
      name: mysqld
      state: started
      enabled: yes

  - name: connect to mysql server
    community.mysql.mysql_info:
      login_user: root
      login_password: ExpenseApp@1
      login_host: 54.172.149.189
    register: mysql_info
    ignore_errors: true

  - name: print the op
    ansible.builtin.debug:
     msg: "{{mysql_info}}"

  - name: setup root password
    ansible.builtin.command: "mysql_secure_installation --set-root-pass ExpenseApp@1"
    when: mysql_info.failed is true
      
